name: install

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on:
  pull_request:
    branches:
      - main
      - "release-*"
    paths-ignore:
      - 'docs/**'
      - 'proposals/**'
      - '**.adoc'
      - '**.md'
      - 'KEYS'
      - 'LICENSE'
      - 'NOTICE'
  push:
    branches:
      - main
      - "release-*"
    paths-ignore:
      - 'docs/**'
      - 'proposals/**'
      - '**.adoc'
      - '**.md'
      - 'KEYS'
      - 'LICENSE'
      - 'NOTICE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  namespaced:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        persist-credentials: false
        submodules: recursive

    - name: Infra setting
      uses: ./.github/actions/infra-setting

    - name: Run test
      shell: bash
      run: |
        GOTESTFMT="-json 2>&1 | gotestfmt" make test-install-namespaced

  other-namespace:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        persist-credentials: false
        submodules: recursive

    - name: Infra setting
      uses: ./.github/actions/infra-setting

    - name: Install operators and tenant namespace
      shell: bash
      run: |
        kubectl create ns operators
        kubectl create ns tenant-a
        kubectl apply -k install/overlays/kubernetes/multi/ --server-side
        kubectl wait --for=condition=available deployment/camel-monitor-operator-tenant-a --timeout=120s -n operators

    - name: Run test
      shell: bash
      run: |
        GOTESTFMT="-json 2>&1 | gotestfmt" make test-install-other-namespace
