kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: camel-monitor-operator
  labels:
    app: "camel-monitor"
rules:
- apiGroups:
  - camel.apache.org
  resources:
  - camelmonitors
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
  - delete
- apiGroups:
  - camel.apache.org
  resources:
  - camelmonitors/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch
  resources:
  - cronjobs
  - jobs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/proxy
  - pods/log
  verbs:
  - get