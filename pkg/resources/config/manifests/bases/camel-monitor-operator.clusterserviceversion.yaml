apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    capabilities: Full Lifecycle
    categories: Observability
    certified: "false"
    containerImage: quay.io/camel-tooling/camel-monitor-operator:0.3.0-SNAPSHOT
    createdAt: 2026-04-20T10:13:31Z
    description: Camel Monitor Operator is the monitoring tool for your Apache Camel applications running on cloud.
    operators.operatorframework.io/builder: operator-sdk-v1.16.0
    operators.operatorframework.io/internal-objects: '["camelmonitors.camel.apache.org"]'
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v2
    repository: https://github.com/camel-tooling/camel-monitor-operator
    support: Camel
  name: camel-monitor-operator.v0.3.0
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: CamelMonitor is the Schema for the CamelMonitor API
      displayName: CamelMonitor
      kind: CamelMonitor
      name: camelmonitors.camel.apache.org
      version: v1alpha1
  description: |
    Camel Monitor Operator is the monitoring tool for your Apache Camel applications running on cloud.
    ## Installation
    Proceed to the Camel Monitor operator installation via `Subscription` or via GUI.
    See official Camel Monitor operator documentation to learn how to configure all the available parameters.
    ## Monitoring an Apache Camel Application
    Run an Apache Camel application on the cluster (for example via Apache Camel K operator). Immediately you will be able to see a `CamelMonitor`:

    ```
    kubectl get camelmonitors -w

    NAME        INFO                        PHASE     REPLICAS   HEALTHY   MONITORED   MEMORY PRESSURE   CPU PRESSURE   EXCHANGE SLI   LAST EXCHANGE
    sample-it   Quarkus - 3.30.8 (4.16.0)   Running   1          True      True        False             False          Success        1s
    sample-it   Quarkus - 3.30.8 (4.16.0)   Paused    0          Unknown   Unknown                                      Success        61s
    ...
    ```
  displayName: Camel Monitor Operator
  icon:
  - base64data: 
    mediatype: image/png
  install:
    spec:
      deployments: null
    strategy: deployment
  installModes:
  - supported: true
    type: OwnNamespace
  - supported: true
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - apache
  - camel
  - dashboard
  - kubernetes
  - monitoring
  - microservices
  - integration
  - observability
  labels:
    name: camel-monitor-operator
  links:
  - name: Camel Monitor operator source code repository
    url: https://github.com/camel-tooling/camel-monitor-operator
  maintainers:
  - email: pcongiusti@apache.org
    name: Pasquale Congiusti
  maturity: alpha
  provider:
    name: Camel Tooling team
  # to include after first release
  # replaces: camel-monitor-operator.v0.3.0
  selector:
    matchLabels:
      name: camel-monitor-operator
  version: 0.3.0
