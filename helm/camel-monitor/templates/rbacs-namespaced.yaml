{{- if not .Values.operator.global }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app: camel-monitor
  name: camel-monitor-operator
rules:
- apiGroups:
  - camel.apache.org
  resources:
  - camelmonitors
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
  - delete
- apiGroups:
  - camel.apache.org
  resources:
  - camelmonitors/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch
  resources:
  - cronjobs
  - jobs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app: camel-monitor
  name: camel-monitor-operator-events
rules:
- apiGroups:
  - ""
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app: camel-monitor
  name: camel-monitor-operator-grafana
rules:
- apiGroups:
  - grafana.integreatly.org
  resources:
  - grafanadashboards
  verbs:
  - create
  - get
  - list
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app: camel-monitor
  name: camel-monitor-operator-openshift
rules:
- apiGroups:
  - camel.apache.org
  resources:
  - camelmonitors/finalizers
  verbs:
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app: camel-monitor
  name: camel-monitor-operator-prometheus
rules:
- apiGroups:
  - monitoring.coreos.com
  resources:
  - podmonitors
  - prometheusrules
  verbs:
  - create
  - get
  - list
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app: camel-monitor
  name: camel-monitor-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: camel-monitor-operator
subjects:
- kind: ServiceAccount
  name: camel-monitor-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app: camel-monitor
  name: camel-monitor-operator-events
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: camel-monitor-operator-events
subjects:
- kind: ServiceAccount
  name: camel-monitor-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app: camel-monitor
  name: camel-monitor-operator-grafana
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: camel-monitor-operator-grafana
subjects:
- kind: ServiceAccount
  name: camel-monitor-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app: camel-monitor
  name: camel-monitor-operator-openshift
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: camel-monitor-operator-openshift
subjects:
- kind: ServiceAccount
  name: camel-monitor-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app: camel-monitor
  name: camel-monitor-operator-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: camel-monitor-operator-prometheus
subjects:
- kind: ServiceAccount
  name: camel-monitor-operator
{{- end }}
